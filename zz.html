<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        /* ==========================
   Register Section
========================== */

.register_section{
    padding:80px 0;
    background:#f8fafc;
}

.register_title{
    text-align:center;
    margin-bottom:45px;
}

.register_title h2{
    font-size:36px;
    color:#111827;
    margin-bottom:10px;
}

.register_title p{
    color:#6b7280;
    font-size:16px;
}

/* ==========================
   Form
========================== */

.register_form{
    max-width:700px;
    margin:auto;
    background:#fff;
    padding:40px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.input_group{
    margin-bottom:22px;
}

.input_group label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#374151;
}

.input_group input,
.input_group select,
.input_group textarea{
    width:100%;
    padding:14px;
    border:1px solid #d1d5db;
    border-radius:6px;
    font-size:15px;
    outline:none;
    box-sizing:border-box;
    transition:.3s;
}

.input_group input:focus,
.input_group select:focus,
.input_group textarea:focus{
    border-color:#2563eb;
}

.input_group textarea{
    resize:vertical;
}

.register_form button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:6px;
    background:#2563eb;
    color:#fff;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.register_form button:hover{
    background:#1d4ed8;
}
    </style>
</head>
<body>
    <section class="register_section">

    <div class="all_container">

        <div class="register_title">
            <h2>Register For The Event</h2>
            <p>Reserve your seat today. Limited seats available!</p>
        </div>

        <form class="register_form" action="#">

            <div class="input_group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name">
            </div>

            <div class="input_group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email">
            </div>

            <div class="input_group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" placeholder="Enter your phone number">
            </div>

            <div class="input_group">
                <label for="ticket">Select Ticket</label>

                <select id="ticket">
                    <option>Standard</option>
                    <option>Premium</option>
                    <option>VIP</option>
                </select>
            </div>

            <div class="input_group">
                <label for="message">Message</label>
                <textarea id="message" rows="5" placeholder="Write your message..."></textarea>
            </div>

            <button type="submit">Register Now</button>

        </form>

    </div>

</section>
</body>
</html>
